<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <title>Oxford 3000 - Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(30, 41, 59, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --accent-glow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        body {
            font-family: 'Assistant', sans-serif;
            margin: 0;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* רקע חלקיקים אנימטיבי מרשים */
        .bg-particles {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            overflow: hidden;
        }
        
        .circle {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(45deg, rgba(56, 189, 248, 0.1), rgba(139, 92, 246, 0.15));
            animation: float 20s infinite linear;
            filter: blur(30px);
        }

        .circle:nth-child(1) { width: 300px; height: 300px; top: -10%; left: -10%; animation-duration: 25s; }
        .circle:nth-child(2) { width: 400px; height: 400px; bottom: -20%; right: -10%; animation-duration: 30s; animation-direction: reverse; }
        .circle:nth-child(3) { width: 250px; height: 250px; top: 40%; left: 60%; animation-duration: 22s; }

        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -50px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }

        .english-font { font-family: 'Outfit', sans-serif; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
        }
        
        /* אפקט הברקה פנימית לזכוכית */
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            animation: shine 8s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn {
            0% { transform: scale(0.8) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .success-glow { animation: successGlow 1.5s ease-out; }
        @keyframes successGlow {
            0% { box-shadow: var(--glass-shadow); border-color: var(--glass-border); }
            15% { box-shadow: 0 0 40px 10px rgba(52, 211, 153, 0.4); border-color: rgba(52, 211, 153, 0.8); transform: scale(1.02); }
            100% { box-shadow: var(--glass-shadow); border-color: var(--glass-border); transform: scale(1); }
        }

        .medal-pop { animation: medalPop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes medalPop {
            0% { transform: scale(0) rotate(-45deg); opacity: 0; }
            50% { transform: scale(1.2) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .medal-locked { filter: grayscale(100%) brightness(0.4); transform: scale(0.9); }
        .medal-unlocked { filter: none; transform: scale(1.1); text-shadow: 0 0 20px rgba(255,255,255,0.4); }

        input::placeholder { color: rgba(255, 255, 255, 0.4); }
        input[type="text"] { font-size: 18px !important; }
        @media (min-width: 640px) { input[type="text"] { font-size: 1.5rem !important; } }
        
        /* מד התקדמות */
        .progress-container {
            width: 100%; height: 6px; background: rgba(0,0,0,0.3);
            border-radius: 10px; overflow: hidden; margin-top: 8px;
        }
        .progress-bar {
            height: 100%; background: linear-gradient(90deg, #38bdf8, #8b5cf6);
            border-radius: 10px; transition: width 0.5s ease-out;
        }
    </style>
</head>

        // פונקציות מתמטיות ולוגיות
        function getEditDistance(a, b) {
            a = a.toLowerCase(); b = b.toLowerCase();
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            const matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) == a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(
                            matrix[i - 1][j - 1] + 1, 
                            Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1) 
                        );
                    }
                }
            }
            return matrix[b.length][a.length];
        }

        function speakWord() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); 
                const utterance = new SpeechSynthesisUtterance(currentEnglishWord);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                window.speechSynthesis.speak(utterance);
            }
        }

        // הגדרות ממשק
        function updateStartScreenBtns() {
            modeTypingBtn.className = gameMode === 'typing' ? "flex-1 py-2 rounded-lg text-white font-bold bg-slate-700 shadow-md transition-all text-sm" : "flex-1 py-2 rounded-lg text-slate-400 hover:text-white transition-all text-sm";

            dirEnHeBtn.className = gameDirection === 'en-he' ? "flex-1 py-2 rounded-lg text-white font-bold bg-slate-700 shadow-md transition-all text-sm" : "flex-1 py-2 rounded-lg text-slate-400 hover:text-white transition-all text-sm";
            dirHeEnBtn.className = gameDirection === 'he-en' ? "flex-1 py-2 rounded-lg text-white font-bold bg-slate-700 shadow-md transition-all text-sm" : "flex-1 py-2 rounded-lg text-slate-400 hover:text-white transition-all text-sm";
        }

        function applySettings() {
            localStorage.setItem('oxfordVocabMode', gameMode);
            localStorage.setItem('oxfordVocabDir', gameDirection);
            
            const dirLabel = gameDirection === 'en-he' ? 'EN➔HE' : 'HE➔EN';
            const modeLabel = gameMode === 'typing' ? 'הקלדה' : 'אמריקאי';
            currentSettingsLabel.textContent = `${dirLabel} | ${modeLabel}`;

            if (gameMode === 'typing') {
                typingInputWrapper.classList.remove('hidden');
                submitBtn.classList.remove('hidden');
                choiceGridContainer.classList.add('hidden');
                if(window.innerWidth > 640 && startScreen.style.display === 'none') answerInput.focus();
            } else {
                typingInputWrapper.classList.add('hidden');
                submitBtn.classList.add('hidden');
                choiceGridContainer.classList.remove('hidden');
                generateChoiceButtons();
            }
        }

        // הפעלה
        async function initApp() {
            bgMusic.volume = 0.4;
            medalSound.volume = 0.8;
            bgMusic.load();

            userName = localStorage.getItem('oxfordVocabUser') || '';
            if (userName) {
                userInputContainer.classList.add('hidden');
                welcomeBackContainer.classList.remove('hidden');
                welcomeName.textContent = userName;
            }

            updateStartScreenBtns();

            changeUserBtn.addEventListener('click', () => {
                if(confirm('האם אתה בטוח? הניקוד הנוכחי יאופס במכשיר זה.')) {
                    localStorage.removeItem('oxfordVocabUser');
                    localStorage.removeItem('oxfordVocabScore');
                    userName = ''; score = 0; currentMedal = 'none';
                    medalContainer.classList.add('hidden');
                    updateScoreUI();
                    welcomeBackContainer.classList.add('hidden');
                    userInputContainer.classList.remove('hidden');
                    usernameInput.value = ''; usernameInput.focus();
                }
            });

            startBtn.addEventListener('click', () => {
                if (!userName) {
                    const inputVal = usernameInput.value.trim();
                    userName = inputVal ? inputVal : "שחקן אלמוני";
                    localStorage.setItem('oxfordVocabUser', userName);
                }

                const playPromise = bgMusic.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        isMusicPlaying = true;
                        musicToggle.textContent = '🎵';
                    }).catch(() => {
                        musicToggle.textContent = '🔇';
                        musicToggle.classList.add('opacity-50');
                    });
                }

                applySettings();

                startScreen.style.opacity = '0';
                setTimeout(() => {
                    startScreen.style.display = 'none';
                    gameContainer.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
                    gameContainer.classList.add('opacity-100', 'scale-100');
                    pickNewWord();
                }, 400);
            });

            setupEventListeners();
            
            if (firebaseConfigStr) await initFirebase(); 
            else await loadScore(); 
        }

        function calculateProgress(currentScore) {
            let nextTarget = 10000;
            let prevTarget = 0;
            if (currentScore < 100) { nextTarget = 100; prevTarget = 0; }
            else if (currentScore < 500) { nextTarget = 500; prevTarget = 100; }
            else if (currentScore < 1000) { nextTarget = 1000; prevTarget = 500; }
            else if (currentScore < 5000) { nextTarget = 5000; prevTarget = 1000; }
            else if (currentScore < 10000) { nextTarget = 10000; prevTarget = 5000; }
            else return 100;

            let percentage = ((currentScore - prevTarget) / (nextTarget - prevTarget)) * 100;
            return Math.min(Math.max(percentage, 0), 100);
        }

        function openProfile() {
            profileNameDisplay.textContent = userName;
            profileScoreDisplay.textContent = score;
            
            for (const [key, obj] of Object.entries(medalsObj)) {
                obj.elem.className = score >= obj.threshold ? "flex flex-col items-center transition-all duration-500 medal-unlocked w-16 sm:w-20" : "flex flex-col items-center transition-all duration-500 medal-locked w-16 sm:w-20";
            }

            if (score < 100) nextMedalHint.textContent = `עוד ${100 - score} נקודות לארד`;
            else if (score < 500) nextMedalHint.textContent = `עוד ${500 - score} נקודות לכסף`;
            else if (score < 1000) nextMedalHint.textContent = `עוד ${1000 - score} נקודות לזהב`;
            else if (score < 5000) nextMedalHint.textContent = `עוד ${5000 - score} נקודות לענבר`;
            else if (score < 10000) nextMedalHint.textContent = `עוד ${10000 - score} נקודות ליהלום`;
            else nextMedalHint.textContent = "השגת את כל המדליות! 👑";

            profileProgressBar.style.width = `${calculateProgress(score)}%`;

            profileModal.classList.remove('hidden');
            setTimeout(() => {
                profileModal.classList.remove('opacity-0');
                profileContent.classList.remove('scale-95');
                profileContent.classList.add('scale-100');
            }, 10);
        }

        function closeProfile() {
            profileModal.classList.add('opacity-0');
            profileContent.classList.remove('scale-100');
            profileContent.classList.add('scale-95');
            setTimeout(() => {
                profileModal.classList.add('hidden');
                if(gameMode === 'typing' && window.innerWidth > 640) answerInput.focus();
            }, 300);
        }

        async function initFirebase() {
            try {
                const firebaseConfig = JSON.parse(firebaseConfigStr);
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);

                onAuthStateChanged(auth, async (user) => {
                    if (user) { userUid = user.uid; await loadScore(); }
                });
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch (error) { await loadScore(); }
        }

        async function loadScore() {
            const localScore = localStorage.getItem('oxfordVocabScore');
            if (localScore !== null) {
                score = parseInt(localScore, 10);
                updateScoreUI(); checkMedals(score, false);
            }
            if (!db || !userUid) return;
            try {
                const docSnap = await getDoc(doc(db, 'artifacts', appId, 'users', userUid, 'scores', 'main'));
                if (docSnap.exists()) {
                    const cloudScore = docSnap.data().value || 0;
                    if (cloudScore >= score) {
                        score = cloudScore; updateScoreUI(); checkMedals(score, false);
                    }
                }
            } catch (e) {}
        }

        async function saveScore() {
            localStorage.setItem('oxfordVocabScore', score);
            if (!db || !userUid) return;
            try { await setDoc(doc(db, 'artifacts', appId, 'users', userUid, 'scores', 'main'), { value: score }); } catch (e) {}
        }

        function checkMedals(currentScore, isUpgrade = true) {
            let newMedal = 'none', emoji = '', name = '';
            if (currentScore >= 10000) { newMedal = 'diamond'; emoji = '💎'; name = 'יהלום'; }
            else if (currentScore >= 5000) { newMedal = 'amber'; emoji = '🔶'; name = 'ענבר'; }
            else if (currentScore >= 1000) { newMedal = 'gold'; emoji = '🥇'; name = 'זהב'; }
            else if (currentScore >= 500) { newMedal = 'silver'; emoji = '🥈'; name = 'כסף'; }
            else if (currentScore >= 100) { newMedal = 'bronze'; emoji = '🥉'; name = 'ארד'; }

            if (newMedal !== 'none') {
                medalDisplay.textContent = emoji;
                medalContainer.classList.remove('hidden');
                
                if (isUpgrade && newMedal !== currentMedal) {
                    medalSound.play().catch(e => {});
                    medalContainer.classList.remove('medal-pop');
                    void medalContainer.offsetWidth; 
                    medalContainer.classList.add('medal-pop');
                    showFeedback(`זכית במדליית ${name}! ${emoji}`, "success");
                }
            }
            currentMedal = newMedal;
        }

        function pickNewWord() {
            wordDisplay.parentElement.classList.remove('pop-in');
            void wordDisplay.parentElement.offsetWidth;
            wordDisplay.parentElement.classList.add('pop-in');
            hintUsedForCurrentWord = false; 
            
            const randomIndex = Math.floor(Math.random() * wordKeys.length);
            currentEnglishWord = wordKeys[randomIndex];
            const hebrewOptions = wordsDB[currentEnglishWord];
            currentHebrewWord = hebrewOptions[Math.floor(Math.random() * hebrewOptions.length)];
            
            answerInput.value = '';
            answerInput.classList.remove('border-red-400', 'bg-rose-900/40');

            if (gameDirection === 'en-he') {
                questionLabel.textContent = "תרגם לעברית";
                wordDisplay.textContent = currentEnglishWord;
                wordDisplay.className = "english-font text-5xl sm:text-6xl md:text-7xl font-black text-white drop-shadow-[0_2px_10px_rgba(0,0,0,0.5)] break-words";
                answerInput.placeholder = "הקלד תרגום עברי...";
                answerInput.dir = "rtl";
            } else {
                questionLabel.textContent = "Translate to English";
                wordDisplay.textContent = currentHebrewWord;
                wordDisplay.className = "text-4xl sm:text-5xl md:text-6xl font-black text-white drop-shadow-[0_2px_10px_rgba(0,0,0,0.5)] break-words";
                answerInput.placeholder = "Type in English...";
                answerInput.dir = "ltr";
            }

            // תמיד להשמיע את האנגלית אם זה הופיע 
            if (gameDirection === 'en-he') {
                setTimeout(speakWord, 300);
            }

            if (gameMode === 'typing') {
                if(window.innerWidth > 640 && startScreen.style.display === 'none') { answerInput.focus(); }
            } else {
                generateChoiceButtons();
            }
        }

        function generateChoiceButtons() {
            if (!currentEnglishWord) return;
            choiceGrid.innerHTML = ''; 
            
            let options = [];
            
            if (gameDirection === 'en-he') {
                options = [wordsDB[currentEnglishWord][0]];
                while(options.length < 10) {
                    const rWord = wordKeys[Math.floor(Math.random() * wordKeys.length)];
                    const wrong = wordsDB[rWord][0];
                    if (!wordsDB[currentEnglishWord].includes(wrong) && !options.includes(wrong)) options.push(wrong);
                }
            } else {
                options = [currentEnglishWord];
                while(options.length < 10) {
                    const wrong = wordKeys[Math.floor(Math.random() * wordKeys.length)];
                    if (wrong !== currentEnglishWord && !options.includes(wrong)) options.push(wrong);
                }
            }
            
            options = options.sort(() => Math.random() - 0.5);
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.className = `bg-slate-800/80 hover:bg-slate-700 border border-slate-600 text-white font-semibold py-4 px-2 rounded-xl transition-all active:scale-95 text-sm sm:text-base break-words flex items-center justify-center min-h-[60px] ${gameDirection === 'he-en' ? 'english-font' : ''}`;
                btn.onclick = () => checkChoiceAnswer(btn, opt);
                choiceGrid.appendChild(btn);
            });
        }

        function checkChoiceAnswer(btn, selectedOption) {
            const allButtons = choiceGrid.querySelectorAll('button');
            allButtons.forEach(b => b.disabled = true);

            let isCorrect = false;
            if (gameDirection === 'en-he') {
                isCorrect = wordsDB[currentEnglishWord].includes(selectedOption);
            } else {
                isCorrect = (selectedOption === currentEnglishWord);
            }

            if (isCorrect) {
                btn.classList.add('bg-emerald-500/80', 'border-emerald-400');
                if (gameDirection === 'he-en') speakWord(); // משמיע רק בהצלחה
                
                if (!hintUsedForCurrentWord) {
                    score += 10; updateScoreUI(); saveScore(); checkMedals(score, true); 
                    showFeedback("נכון מאוד! ✨", "success");
                } else showFeedback("נכון! (ללא ניקוד)", "info");
                
                setTimeout(pickNewWord, 1000); 
            } else {
                btn.classList.add('bg-rose-500/80', 'border-rose-400', 'shake');
                showFeedback("טעות, נסה שוב", "error");
                setTimeout(() => {
                    btn.classList.remove('bg-rose-500/80', 'border-rose-400', 'shake');
                    allButtons.forEach(b => b.disabled = false);
                }, 500);
            }
        }

        function checkAnswer() {
            const userInput = answerInput.value.trim();
            if (!userInput) return;

            let isCorrect = false;
            let matchedAnswer = "";

            if (gameDirection === 'en-he') {
                const correctAnswers = wordsDB[currentEnglishWord];
                for (let answer of correctAnswers) {
                    const cleanAnswer = answer.trim();
                    if (userInput === cleanAnswer) { isCorrect = true; matchedAnswer = cleanAnswer; break; }
                    const dist = getEditDistance(userInput, cleanAnswer);
                    const allowed = cleanAnswer.length <= 3 ? 0 : (cleanAnswer.length <= 5 ? 1 : 2);
                    if (dist <= allowed) { isCorrect = true; matchedAnswer = cleanAnswer; break; }
                }
            } else {
                // בדיקה מאנגלית לעברית
                if (userInput.toLowerCase() === currentEnglishWord.toLowerCase()) { isCorrect = true; }
                else {
                    const dist = getEditDistance(userInput, currentEnglishWord);
                    const allowed = currentEnglishWord.length <= 4 ? 0 : (currentEnglishWord.length <= 7 ? 1 : 2);
                    if (dist <= allowed) isCorrect = true;
                }
            }
            
            if (isCorrect) {
                if (gameDirection === 'he-en') speakWord();
                
                if (!hintUsedForCurrentWord) {
                    score += 10; updateScoreUI(); saveScore(); checkMedals(score, true); 
                    let msg = "נכון מאוד! ✨";
                    if (gameDirection === 'en-he' && matchedAnswer) {
                        const others = wordsDB[currentEnglishWord].filter(a => a !== matchedAnswer);
                        if(others.length > 0) msg += ` (גם: ${others.join(', ')})`;
                    }
                    if (feedbackMsg.textContent.indexOf('זכית במדליית') === -1) {
                        showFeedback(msg, "success");
                        gameContainer.classList.add('success-glow');
                        setTimeout(() => gameContainer.classList.remove('success-glow'), 1000);
                    }
                } else showFeedback("מעולה! (ללא ניקוד בעקבות רמז)", "info");
                setTimeout(pickNewWord, 1500); 
            } else {
                gameContainer.classList.add('shake');
                answerInput.classList.add('border-rose-400', 'bg-rose-900/40');
                setTimeout(() => {
                    gameContainer.classList.remove('shake');
                    answerInput.classList.remove('border-rose-400', 'bg-rose-900/40');
                }, 400);
                showFeedback("טעות, נסה שוב", "error");
                answerInput.value = '';
                if(window.innerWidth > 640) answerInput.focus();
            }
        }

        function showMeaning() {
            hintUsedForCurrentWord = true; 
            if (gameDirection === 'en-he') {
                showFeedback(`התרגום: ${wordsDB[currentEnglishWord].join(', ')}`, "info");
            } else {
                speakWord();
                showFeedback(`The word is: ${currentEnglishWord}`, "info");
            }
            
            if (gameMode === 'choice') {
                const buttons = choiceGrid.querySelectorAll('button');
                buttons.forEach(btn => {
                    if (gameDirection === 'en-he' && wordsDB[currentEnglishWord].includes(btn.textContent)) btn.classList.add('bg-emerald-500/80', 'border-emerald-400');
                    if (gameDirection === 'he-en' && btn.textContent === currentEnglishWord) btn.classList.add('bg-emerald-500/80', 'border-emerald-400');
                });
            } else if (window.innerWidth > 640) answerInput.focus();
        }

        function skipWord() {
            if (gameDirection === 'en-he') showFeedback(`התשובה: ${wordsDB[currentEnglishWord].join(' או ')}`, "info");
            else showFeedback(`The answer: ${currentEnglishWord}`, "info");
            setTimeout(pickNewWord, 1500);
        }

        function showFeedback(msg, type) {
            feedbackMsg.textContent = msg;
            feedbackMsg.style.opacity = '1';
            feedbackMsg.style.transform = 'translateY(0)';
            
            if (type === 'success') feedbackMsg.className = "mt-6 sm:mt-8 text-lg sm:text-xl font-black text-emerald-400 drop-shadow-md h-12 transition-all duration-300 flex items-center justify-center break-words px-2 text-center";

            else feedbackMsg.className = "mt-6 sm:mt-8 text-base sm:text-lg font-medium text-sky-300 h-12 transition-all duration-300 flex items-center justify-center break-words px-2 text-center";
            
            setTimeout(() => {
                feedbackMsg.style.opacity = '0';
                feedbackMsg.style.transform = 'translateY(10px)';
            }, 3000);
        }

        function updateScoreUI() {
            scoreDisplay.style.transform = "scale(1.3)";
            scoreDisplay.textContent = score;
            miniProgressBar.style.width = `${calculateProgress(score)}%`;
            
            setTimeout(() => {
                scoreDisplay.style.transform = "scale(1)";
                scoreDisplay.style.transition = "all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
            }, 200);
        }

        function setupEventListeners() {
            modeTypingBtn.addEventListener('click', () => { gameMode = 'typing'; updateStartScreenBtns(); });
            modeChoiceBtn.addEventListener('click', () => { gameMode = 'choice'; updateStartScreenBtns(); });
            dirEnHeBtn.addEventListener('click', () => { gameDirection = 'en-he'; updateStartScreenBtns(); });
            dirHeEnBtn.addEventListener('click', () => { gameDirection = 'he-en'; updateStartScreenBtns(); });
            
            settingsToggleBtn.addEventListener('click', () => {
                if (gameDirection === 'en-he' && gameMode === 'typing') { gameMode = 'choice'; }
                else if (gameDirection === 'en-he' && gameMode === 'choice') { gameDirection = 'he-en'; gameMode = 'typing'; }
                else if (gameDirection === 'he-en' && gameMode === 'typing') { gameMode = 'choice'; }
                else { gameDirection = 'en-he'; gameMode = 'typing'; }
                applySettings(); pickNewWord();
            });

            submitBtn.addEventListener('click', checkAnswer);
            skipBtn.addEventListener('click', skipWord);
            revealBtn.addEventListener('click', showMeaning); 
            speakBtn.addEventListener('click', speakWord); 
            
            openProfileBtn.addEventListener('click', openProfile);
            closeProfileBtn.addEventListener('click', closeProfile);
            profileModal.addEventListener('click', (e) => { if (e.target === profileModal) closeProfile(); });
            
            answerInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') { answerInput.blur(); checkAnswer(); }
            });
        }
